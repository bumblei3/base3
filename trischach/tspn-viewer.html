<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TriSchach TSPN Replay Viewer</title>
    <style>
      <style > * {
        box-sizing: border-box;
      }
      :root {
        --bg: #f5f5f5;
        --bg2: #ffffff;
        --text: #333;
        --text-dim: #666;
        --border: #e0e0e0;
        --shadow: rgba(0, 0, 0, 0.1);
        --toolbar-bg: #fff;
        --header-bg: #f8f9fa;
        --move-hover: #f0f0f0;
        --move-current: #eff6ff;
        --status-info-bg: #eff6ff;
        --status-info-color: #1d4ed8;
        --status-error-bg: #fef2f2;
        --status-error-color: #dc2626;
        --status-success-bg: #f0fdf4;
        --status-success-color: #16a34a;
        --btn-bg: #fff;
        --btn-border: #ddd;
        --btn-hover: #f0f0f0;
        --btn-primary: #2563eb;
        --btn-primary-hover: #1d4ed8;
        --slider-track: #e5e7eb;
        --eval-marker: #000;
      }
      [data-theme="dark"] {
        --bg: #1a1a2e;
        --bg2: #16213e;
        --text: #e8e8f0;
        --text-dim: #888899;
        --border: #2a2a44;
        --shadow: rgba(0, 0, 0, 0.3);
        --toolbar-bg: #1a1a2e;
        --header-bg: #16213e;
        --move-hover: #2a2a44;
        --move-current: #1e3a5f;
        --status-info-bg: #1e3a5f;
        --status-info-color: #3b82f6;
        --status-error-bg: #5f1a1a;
        --status-error-color: #ef4444;
        --status-success-bg: #1a5f1a;
        --status-success-color: #22c55e;
        --btn-bg: #1a1a2e;
        --btn-border: #2a2a44;
        --btn-hover: #2a2a44;
        --btn-primary: #3b82f6;
        --btn-primary-hover: #60a5fa;
        --slider-track: #2a2a44;
        --eval-marker: #fff;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 20px;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        transition:
          background 0.3s,
          color 0.3s;
      }
      .container {
        max-width: 1400px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 20px;
      }
      @media (max-width: 1200px) {
        .container {
          grid-template-columns: 1fr;
        }
      }

      .board-section {
        background: var(--bg2);
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 8px var(--shadow);
      }
      .controls-section {
        background: var(--bg2);
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 8px var(--shadow);
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        color: var(--text);
      }
      h2 {
        font-size: 1.1rem;
        margin: 1.5rem 0 0.75rem;
        color: var(--text-dim);
        border-bottom: 1px solid var(--border);
        padding-bottom: 0.5rem;
      }
      h2:first-child {
        margin-top: 0;
      }

      #board-svg {
        display: block;
        margin: 0 auto;
        background: var(--bg);
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .btn {
        padding: 8px 16px;
        border: 1px solid var(--btn-border);
        background: var(--btn-bg);
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.9rem;
        color: var(--text);
        transition: all 0.15s;
      }
      .btn:hover {
        background: var(--btn-hover);
        border-color: var(--border);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn.primary {
        background: var(--btn-primary);
        color: white;
        border-color: var(--btn-primary);
      }
      .btn.primary:hover {
        background: var(--btn-primary-hover);
        border-color: var(--btn-primary-hover);
      }
      .btn.small {
        padding: 4px 10px;
        font-size: 0.8rem;
      }
      .file-input {
        display: none;
      }

      .move-info {
        padding: 1rem;
        background: var(--header-bg);
        border-radius: 6px;
        margin-bottom: 1.5rem;
      }
      .move-info h3 {
        margin: 0 0 0.5rem;
        font-size: 1rem;
      }
      .move-text {
        font-family: monospace;
        font-size: 0.9rem;
        word-break: break-all;
      }

      .slider-container {
        margin: 1.5rem 0;
      }
      #move-slider {
        width: 100%;
        height: 24px;
        cursor: pointer;
      }

      /* Eval Bar */
      .eval-bar-container {
        margin-top: 1.5rem;
      }
      .eval-bar-label {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        margin-bottom: 6px;
        color: var(--text-dim);
      }
      .eval-bar-bg {
        height: 24px;
        background: var(--slider-track);
        border-radius: 12px;
        overflow: hidden;
        position: relative;
      }
      .eval-bar-segment {
        height: 100%;
        position: absolute;
        top: 0;
        transition:
          width 0.3s ease,
          left 0.3s ease;
      }
      .eval-bar-segment.fire {
        background: linear-gradient(90deg, #dc2626, #ef4444);
      }
      .eval-bar-segment.nature {
        background: linear-gradient(90deg, #16a34a, #22c55e);
      }
      .eval-bar-segment.water {
        background: linear-gradient(90deg, #2563eb, #3b82f6);
      }
      .eval-bar-marker {
        position: absolute;
        top: -4px;
        width: 2px;
        height: 32px;
        background: var(--eval-marker);
        pointer-events: none;
        z-index: 10;
        transition: left 0.3s ease;
      }
      .eval-bar-value {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 0.7rem;
        font-weight: bold;
        color: #111;
        pointer-events: none;
      }

      /* Game Headers */
      .headers {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        font-size: 0.85rem;
        margin-bottom: 1.5rem;
        padding: 1rem;
        background: var(--header-bg);
        border-radius: 6px;
      }
      .header-label {
        color: var(--text-dim);
        font-weight: 500;
      }
      .header-value {
        color: var(--text);
        font-family: monospace;
      }

      /* Evaluations table */
      .eval-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      .eval-table th,
      .eval-table td {
        padding: 8px;
        text-align: left;
        border-bottom: 1px solid var(--border);
      }
      .eval-table th {
        background: var(--header-bg);
        color: var(--text-dim);
        font-weight: 600;
      }
      .eval-table .positive {
        color: #16a34a;
      }
      .eval-table .negative {
        color: #dc2626;
      }
      .eval-table .zero {
        color: var(--text-dim);
      }

      .legend {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
        font-size: 0.75rem;
        color: var(--text-dim);
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .legend-color {
        width: 12px;
        height: 12px;
        border-radius: 2px;
      }

      /* Move List */
      .move-list {
        max-height: 300px;
        overflow-y: auto;
        font-size: 0.8rem;
      }
      .move-row {
        padding: 4px 8px;
        cursor: pointer;
        border-radius: 4px;
        transition: background 0.1s;
      }
      .move-row:hover {
        background: var(--move-hover);
      }
      .move-row.current {
        background: var(--move-current);
        font-weight: 500;
      }
      .move-number {
        color: var(--text-dim);
        font-family: monospace;
        width: 3ch;
        display: inline-block;
      }
      .move-text {
        color: var(--text);
      }
      .move-text.capture {
        color: #dc2626;
      }
      .move-text.promotion {
        color: #7c2d12;
      }
      .faction-fire {
        color: #dc2626;
      }
      .faction-water {
        color: #2563eb;
      }
      .faction-nature {
        color: #16a34a;
      }

      .status {
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 0.85rem;
        margin-bottom: 1rem;
      }
      .status.info {
        background: var(--status-info-bg);
        color: var(--status-info-color);
      }
      .status.error {
        background: var(--status-error-bg);
        color: var(--status-error-color);
      }
      .status.success {
        background: var(--status-success-bg);
        color: var(--status-success-color);
      }

      /* Theme toggle button active state */
      #theme-toggle.active {
        background: var(--btn-primary);
        color: white;
        border-color: var(--btn-primary);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="board-section">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
          "
        >
          <h1>TSPN Replay Viewer</h1>
          <div class="toolbar">
            <label class="btn" for="tspn-file">📁 Load TSPN</label>
            <input
              type="file"
              id="tspn-file"
              class="file-input"
              accept=".tspn,.pgn,.txt"
            />
            <button class="btn" id="demo-btn">Demo Game</button>
            <button
              class="btn"
              id="download-btn"
              title="Download TSPN"
              disabled
            >
              💾 Download
            </button>
            <button
              class="btn"
              id="copy-btn"
              title="Copy TSPN to Clipboard (C)"
              disabled
            >
              📋 Copy
            </button>
            <button class="btn" id="flip-btn" title="Flip Board (F)">
              🔄 Flip
            </button>
            <label class="btn" id="theme-toggle" title="Toggle Dark Theme (D)">
              <input
                type="checkbox"
                id="dark-mode-checkbox"
                style="display: none"
              />
              🌙 Dark
            </label>
          </div>
        </div>

        <div id="status"></div>

        <div class="headers" id="headers" style="display: none"></div>

        <svg
          id="board-svg"
          viewBox="0 0 600 600"
          width="600"
          height="600"
        ></svg>

        <div class="move-info" id="move-info" style="display: none">
          <h3>Current Move</h3>
          <div class="move-text" id="move-text">—</div>
        </div>

        <div
          class="slider-container"
          id="slider-container"
          style="display: none"
        >
          <input
            type="range"
            id="move-slider"
            min="0"
            max="0"
            value="0"
            step="1"
          />
          <div
            style="
              display: flex;
              justify-content: space-between;
              font-size: 0.75rem;
              color: #999;
              margin-top: 4px;
            "
          >
            <span>Start</span>
            <span id="slider-index">0 / 0</span>
            <span>End</span>
          </div>
        </div>

        <div
          class="toolbar"
          id="nav-toolbar"
          style="display: none; justify-content: center"
        >
          <button class="btn" id="first-btn" title="First">⏮</button>
          <button class="btn" id="prev-btn" title="Previous">◀</button>
          <button class="btn primary" id="play-btn" title="Play/Pause">
            ▶
          </button>
          <button class="btn" id="next-btn" title="Next">▶</button>
          <button class="btn" id="last-btn" title="Last">⏭</button>
          <span style="margin-left: auto; font-size: 0.85rem; color: #666"
            >Speed:
            <select id="speed-select">
              <option value="500">0.5s</option>
              <option value="1000" selected>1s</option>
              <option value="2000">2s</option>
            </select></span
          >
        </div>
      </div>

      <div class="controls-section">
        <h2>AI Evaluation</h2>

        <div class="eval-bar-container">
          <div class="eval-bar-label">
            <span style="color: #dc2626">Fire</span>
            <span style="color: #16a34a">Nature</span>
            <span style="color: #2563eb">Water</span>
            <span style="font-weight: bold" id="total-score">Score: 0</span>
          </div>
          <div class="eval-bar-bg" id="eval-bar-bg">
            <div
              class="eval-bar-segment fire"
              id="fire-segment"
              style="width: 33.33%"
            ></div>
            <div
              class="eval-bar-segment nature"
              id="nature-segment"
              style="width: 33.33%"
            ></div>
            <div
              class="eval-bar-segment water"
              id="water-segment"
              style="width: 33.33%"
            ></div>
            <div
              class="eval-bar-marker"
              id="eval-marker"
              style="left: 50%"
            ></div>
          </div>
        </div>

        <div style="margin-top: 1.5rem">
          <h2>Detailed Scores</h2>
          <table class="eval-table" id="eval-table">
            <thead>
              <tr>
                <th>Metric</th>
                <th>Fire</th>
                <th>Nature</th>
                <th>Water</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Material</td>
                <td id="m-fire">0</td>
                <td id="m-nature">0</td>
                <td id="m-water">0</td>
              </tr>
              <tr>
                <td>Positional</td>
                <td id="p-fire">0</td>
                <td id="p-nature">0</td>
                <td id="p-water">0</td>
              </tr>
              <tr>
                <td>King Safety</td>
                <td id="k-fire">0</td>
                <td id="k-nature">0</td>
                <td id="k-water">0</td>
              </tr>
              <tr>
                <td>King Threats</td>
                <td id="t-fire">0</td>
                <td id="t-nature">0</td>
                <td id="t-water">0</td>
              </tr>
              <tr>
                <td>Mobility</td>
                <td id="o-fire">0</td>
                <td id="o-nature">0</td>
                <td id="o-water">0</td>
              </tr>
              <tr>
                <td><strong>Total</strong></td>
                <td id="tot-fire" class="zero"><strong>0</strong></td>
                <td id="tot-nature" class="zero"><strong>0</strong></td>
                <td id="tot-water" class="zero"><strong>0</strong></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="legend">
          <div class="legend-item">
            <div class="legend-color" style="background: #dc2626"></div>
            Fire
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #16a34a"></div>
            Nature
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #2563eb"></div>
            Water
          </div>
        </div>

        <h2 style="margin-top: 2rem">Move History</h2>
        <div class="move-list" id="move-list"></div>
      </div>
    </div>

    <script type="module">
      import { parseTSPN, ReplayController } from "./js/replay.js";
      import { Game } from "./js/game.js";
      import { generateBoard } from "./js/board.js";
      import {
        evaluateBoard,
        FACTION,
        setAIDepth,
        getPersonalityWeights,
        getPersonalityAggression,
      } from "./js/ai-core.js";
      import { Hex } from "./js/hex.js";
      import { getValidMoves, PIECE_STRENGTH } from "./js/pieces.js";
      import { getRPSResult } from "./js/board.js";
      import { evaluatePawnStructure, evaluateEndgame } from "./js/ai-core.js";
      import { BoardRenderer } from "./js/board.js";

      // ─── DOM Elements ───
      const statusEl = document.getElementById("status");
      const headersEl = document.getElementById("headers");
      const moveInfoEl = document.getElementById("move-info");
      const moveTextEl = document.getElementById("move-text");
      const sliderContainerEl = document.getElementById("slider-container");
      const moveSlider = document.getElementById("move-slider");
      const sliderIndexEl = document.getElementById("slider-index");
      const navToolbarEl = document.getElementById("nav-toolbar");
      const moveListEl = document.getElementById("move-list");
      const boardSvg = document.getElementById("board-svg");

      // Eval elements
      const fireSeg = document.getElementById("fire-segment");
      const natureSeg = document.getElementById("nature-segment");
      const waterSeg = document.getElementById("water-segment");
      const evalMarker = document.getElementById("eval-marker");
      const totalScoreEl = document.getElementById("total-score");

      const mFire = document.getElementById("m-fire"),
        mNature = document.getElementById("m-nature"),
        mWater = document.getElementById("m-water");
      const pFire = document.getElementById("p-fire"),
        pNature = document.getElementById("p-nature"),
        pWater = document.getElementById("p-water");
      const kFire = document.getElementById("k-fire"),
        kNature = document.getElementById("k-nature"),
        kWater = document.getElementById("k-water");
      const tFire = document.getElementById("t-fire"),
        tNature = document.getElementById("t-nature"),
        tWater = document.getElementById("t-water");
      const oFire = document.getElementById("o-fire"),
        oNature = document.getElementById("o-nature"),
        oWater = document.getElementById("o-water");
      const totFire = document.getElementById("tot-fire"),
        totNature = document.getElementById("tot-nature"),
        totWater = document.getElementById("tot-water");

      // ─── State ───
      let replayController = null;
      let initialGame = null;
      let autoPlayTimer = null;
      let currentEvaluation = null;
      let boardRenderer = null;
      let currentTSPN = null;

      // ─── Utility ───
      function setStatus(msg, type = "info") {
        statusEl.innerHTML = `<div class="status ${type}">${msg}</div>`;
      }

      function show(el, show = true) {
        el.style.display = show ? "" : "none";
      }

      function formatScore(score) {
        const sign = score >= 0 ? "+" : "";
        return `${sign}${score.toFixed(1)}`;
      }

      function setClass(el, classes) {
        el.className = classes;
      }

      // ─── Board Rendering ───
      function renderBoard(game) {
        if (!boardRenderer) {
          boardRenderer = new BoardRenderer(boardSvg);
        }
        boardRenderer.render();
        if (game) {
          for (const piece of game.pieces.filter((p) => p.alive)) {
            boardRenderer.renderPiece(piece);
          }
          // Highlight last move
          if (replayController && replayController.currentIndex >= 0) {
            const move = replayController.getCurrentMove();
            if (move && move.piece && move.target) {
              boardRenderer.highlightCells([move.target], "highlight-last-move");
              boardRenderer.highlightCells([move.piece.pos], "highlight-from");
            }
          }
        }
      }

      // ─── Flip Board ───
      function flipBoard() {
        if (!boardRenderer) return;
        boardRenderer.setRotation(boardRenderer.currentRotation + 180);
        // Re-render current state
        const state = replayController?.getCurrentState();
        if (state) renderBoard(state.game);
      }
            results[faction] = {
              material: -1000,
              positional: 0,
              kingSafety: 0,
              kingThreats: 0,
              mobility: 0,
              total: -1000,
            };
            continue;
          }

          const score = evaluateBoard(game, faction);
          // We also want breakdown - for now just use total
          // In future we could expose the breakdown from evaluateBoard
          results[faction] = {
            material: Math.round(score * 0.4),
            positional: Math.round(score * 0.2),
            kingSafety: Math.round(score * 0.15),
            kingThreats: Math.round(score * 0.15),
            mobility: Math.round(score * 0.1),
            total: Math.round(score),
          };
        }

        return results;
      }

      function updateEvalUI(evals) {
        const evalsArr = [
          {
            faction: FACTION.FIRE,
            val: evals[FACTION.FIRE]?.total || 0,
            el: fireSeg,
          },
          {
            faction: FACTION.NATURE,
            val: evals[FACTION.NATURE]?.total || 0,
            el: natureSeg,
          },
          {
            faction: FACTION.WATER,
            val: evals[FACTION.WATER]?.total || 0,
            el: waterSeg,
          },
        ];

        // Find min/max for normalization
        const vals = evalsArr.map((e) => e.val);
        const minVal = Math.min(...vals);
        const maxVal = Math.max(...vals);
        const range = maxVal - minVal;

        // Update table
        for (const { faction, val } of evalsArr) {
          const suffix =
            faction === FACTION.FIRE
              ? "fire"
              : faction === FACTION.NATURE
                ? "nature"
                : "water";
          document.getElementById(`tot-${suffix}`).textContent =
            formatScore(val);
          document.getElementById(`tot-${suffix}`).className =
            val > 10 ? "positive" : val < -10 ? "negative" : "zero";
        }

        // Update eval bar: three segments (Fire, Nature, Water) proportional to their scores
        // Normalize all scores to positive range by adding offset
        const scores = evalsArr.map((e) => e.val);
        const minScore = Math.min(...scores);
        const offset = minScore < 0 ? -minScore + 10 : 10; // Ensure positive
        const adjustedScores = evalsArr.map((e, i) => ({
          ...e,
          adjusted: e.val + offset,
        }));
        const totalAdjusted = adjustedScores.reduce((s, e) => s + e.adjusted, 0);

        let cumulativePct = 0;
        for (const { val, adjusted, el, faction } of adjustedScores) {
          const width = Math.max(5, (adjusted / totalAdjusted) * 100);
          el.style.width = `${width}%`;
          // Set left position based on cumulative
          el.style.left = `${cumulativePct}%`;
          cumulativePct += width;
        }

        // Marker at current player's perspective
        const current = replayController
          ? replayController.states[replayController.currentIndex + 1]
          : null;
        if (current) {
          const curFaction = current.currentFaction || FACTION.FIRE;
          // Find the center of the current faction's segment
          let markerLeft = 0;
          for (const { val, adjusted, faction } of adjustedScores) {
            if (faction === curFaction) {
              markerLeft += (adjusted / totalAdjusted) * 100 / 2;
              break;
            }
            markerLeft += (adjusted / totalAdjusted) * 100;
          }
          evalMarker.style.left = `${markerLeft}%`;
        }

        // Overall score
        const total = evalsArr.reduce((s, e) => s + e.val, 0);
        totalScoreEl.textContent = `Score: ${formatScore(total)}`;
      }

      // ─── Move List ───
      function updateMoveList() {
        if (!replayController) return;

        moveListEl.innerHTML = "";
        const moves = replayController.moveHistory;

        for (let i = 0; i < moves.length; i++) {
          const move = moves[i];
          const row = document.createElement("div");
          row.className = `move-row${i === replayController.currentIndex ? " current" : ""}`;
          row.onclick = () => goToMove(i);

          const moveNum = Math.floor(i / 3) + 1;
          const moveInRound = i % 3;
          const factionNames = [FACTION.FIRE, FACTION.WATER, FACTION.NATURE];
          const faction = move.faction || factionNames[moveInRound];

          let notation = move.san || formatMoveForDisplay(move);

          row.innerHTML = `${moveNum}. <span class="move-text ${move.isCapture ? "capture" : ""} ${move.promotion ? "promotion" : ""} faction-${faction}">${notation}</span>`;
          moveListEl.appendChild(row);
        }

        // Scroll current into view
        const currentRow = moveListEl.querySelector(".move-row.current");
        if (currentRow) {
          currentRow.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      }

      function formatMoveForDisplay(move) {
        if (!move || !move.piece || !move.target) return "—";
        const pieceName =
          move.piece.type.charAt(0).toUpperCase() + move.piece.type.slice(1);
        const coord = `${move.target.q},${move.target.r}`;
        let str = `${move.faction}_${pieceName}_${coord}`;
        if (move.isCapture) str = str.replace(`_${coord}`, `_x_${coord}`);
        if (move.promotion) str += "=Q";
        if (move.checkmate) str += "#";
        else if (move.check) str += "+";
        return str;
      }

      // ─── Navigation ───
      function goToMove(index) {
        if (!replayController) return;
        const state = replayController.goTo(index);
        if (state) {
          updateUI(state);
        }
      }

      function nextMove() {
        if (!replayController) return;
        const state = replayController.next();
        if (state) updateUI(state);
      }

      function prevMove() {
        if (!replayController) return;
        const state = replayController.previous();
        if (state) updateUI(state);
      }

      function firstMove() {
        if (!replayController) return;
        const state = replayController.goTo(-1);
        if (state) updateUI(state);
      }

      function lastMove() {
        if (!replayController) return;
        const state = replayController.goTo(
          replayController.moveHistory.length - 1,
        );
        if (state) updateUI(state);
      }

      // ─── Auto Play ───
      function togglePlay() {
        const btn = document.getElementById("play-btn");
        if (autoPlayTimer) {
          clearInterval(autoPlayTimer);
          autoPlayTimer = null;
          btn.textContent = "▶";
        } else {
          const speed = parseInt(document.getElementById("speed-select").value);
          autoPlayTimer = setInterval(() => {
            if (!replayController.canGoForward()) {
              clearInterval(autoPlayTimer);
              autoPlayTimer = null;
              btn.textContent = "▶";
            } else {
              nextMove();
            }
          }, speed);
          btn.textContent = "⏸";
        }
      }

      // ─── Main Update ───
      function updateUI(state) {
        if (!state) return;

        // Update board
        renderBoard(state.game);

        // Update move info
        const moveIdx = replayController.currentIndex;
        const totalMoves = replayController.moveHistory.length;

        if (moveIdx >= 0 && moveIdx < totalMoves) {
          const move = replayController.getCurrentMove();
          moveTextEl.textContent = formatMoveForDisplay(move) || "—";
          show(moveInfoEl, true);
        } else {
          moveTextEl.textContent = "Start position";
          show(moveInfoEl, true);
        }

        // Update slider
        moveSlider.max = totalMoves - 1;
        moveSlider.value = Math.max(0, moveIdx);
        sliderIndexEl.textContent = `${moveIdx + 1} / ${totalMoves}`;

        // Update nav buttons
        document.getElementById("prev-btn").disabled =
          !replayController.canGoBack();
        document.getElementById("next-btn").disabled =
          !replayController.canGoForward();
        document.getElementById("first-btn").disabled =
          !replayController.canGoBack();
        document.getElementById("last-btn").disabled =
          !replayController.canGoForward();

        // Update move list
        updateMoveList();

        // Evaluate position
        evaluatePosition(state.game).then(updateEvalUI);
      }

      // ─── Load TSPN ───
      async function loadTSPN(tspnString) {
        try {
          setStatus("Parsing TSPN...", "info");

          currentTSPN = tspnString; // Store for download
          const downloadBtn = document.getElementById("download-btn");
          if (downloadBtn) downloadBtn.disabled = false;
          const copyBtn = document.getElementById("copy-btn");
          if (copyBtn) copyBtn.disabled = false;

          const { headers, moves } = parseTSPN(tspnString);

          // Create initial game
          initialGame = new Game();
          const cells = generateBoard();
          initialGame.init(cells);
          initialGame.rpsEnabled = (headers.RPS || "on") === "on";

          // Build move history from parsed moves
          // The parsed moves need to be converted to game actions
          const moveHistory = [];
          let tempGame = new Game();
          tempGame.init(generateBoard());
          tempGame.rpsEnabled = initialGame.rpsEnabled;

          for (const parsed of moves) {
            // Find the piece and target in tempGame
            let piece = tempGame.pieces.find(
              (p) =>
                p.id.startsWith(parsed.faction) &&
                p.type
                  .toLowerCase()
                  .startsWith(parsed.pieceName.toLowerCase()) &&
                p.alive,
            );
            if (!piece && parsed.target) {
              // Try to find any piece of that faction and type
              piece = tempGame.pieces.find(
                (p) =>
                  p.faction === parsed.faction &&
                  p.type.toLowerCase() === parsed.pieceName.toLowerCase() &&
                  p.alive,
              );
            }

            if (piece && parsed.target) {
              const target = new Hex(parsed.target.q, parsed.target.r);
              const selectResult = tempGame.handleCellClick(piece.pos);
              if (selectResult && selectResult.action === "select") {
                const result = tempGame.handleCellClick(target);
                if (parsed.promotion && result?.promotion) {
                  tempGame.completePromotion(parsed.promotionType || "queen");
                }
                moveHistory.push({
                  ...parsed,
                  piece,
                  target,
                  result,
                });
              }
            } else if (parsed.promotion) {
              // Handle promotion-only move
              moveHistory.push(parsed);
            }
          }

          // Create replay controller
          replayController = new ReplayController(initialGame, moveHistory);

          // Render initial state
          const initialState = replayController.getCurrentState();
          renderBoard(initialState);

          // Show UI
          show(headersEl, true);
          show(moveInfoEl, true);
          show(sliderContainerEl, true);
          show(navToolbarEl, true);

          // Update headers
          headersEl.innerHTML = "";
          for (const [key, value] of Object.entries(headers)) {
            const row = document.createElement("div");
            row.innerHTML = `<span class="header-label">${key}:</span><span class="header-value">${value}</span>`;
            headersEl.appendChild(row);
          }

          // Build move list
          updateMoveList();

          // Update UI for start position
          updateUI(initialState);

          setStatus("TSPN loaded successfully", "success");
        } catch (err) {
          console.error(err);
          setStatus(`Error loading TSPN: ${err.message}`, "error");
        }
      }

      // ─── Demo Game ───
      async function loadDemo() {
        setStatus("Generating demo game...", "info");

        currentTSPN = null; // Demo game has no TSPN
        const downloadBtn = document.getElementById("download-btn");
        if (downloadBtn) downloadBtn.disabled = true;
        const copyBtn = document.getElementById("copy-btn");
        if (copyBtn) copyBtn.disabled = true;

        // Create a simple demo game between AI personalities
        const game = new Game();
        const cells = generateBoard();
        game.init(cells);
        game.rpsEnabled = true;

        // Quick AI vs AI
        const moveHistory = [];
        const tempGame = new Game();
        tempGame.init(generateBoard());
        tempGame.rpsEnabled = true;

        let moveCount = 0;
        const maxMoves = 30;

        while (moveCount < maxMoves && tempGame.state !== "game_over") {
          // Simple greedy move for demo
          const actions = tempGame.pieces
            .filter((p) => p.faction === tempGame.currentFaction && p.alive)
            .flatMap((p) => {
              const { moves, attacks } = tempGame.getLegalMoves(p);
              return [
                ...moves.map((t) => ({ piece: p, target: t, type: "move" })),
                ...attacks.map((t) => ({
                  piece: p,
                  target: t,
                  type: "attack",
                  rps: tempGame.rpsEnabled
                    ? getRPSResult(tempGame.currentFaction, p.faction)
                    : "advantage",
                })),
              ];
            });

          if (actions.length === 0) break;

          // Pick random move for demo
          const action = actions[Math.floor(Math.random() * actions.length)];
          const piece = tempGame.pieces.find((p) => p.id === action.piece.id);

          const selectResult = tempGame.handleCellClick(action.piece.pos);
          if (selectResult && selectResult.action === "select") {
            const result = tempGame.handleCellClick(action.target);
            if (result?.promotion && tempGame.pendingPromotion) {
              tempGame.completePromotion("queen");
            }

            moveHistory.push({
              san: `${action.piece.faction}_${action.piece.type}_${action.target.q},${action.target.r}`,
              faction: action.piece.faction,
              pieceName: action.piece.type,
              target: { q: action.target.q, r: action.target.r },
              piece,
              target: action.target,
              isCapture: action.type === "attack",
              promotion: !!result?.promotion,
              rpsResult: action.rpsResult,
            });
          }

          moveCount++;
        }

        initialGame = new Game();
        initialGame.init(generateBoard());
        initialGame.rpsEnabled = true;

        replayController = new ReplayController(initialGame, moveHistory);
        const initialState = replayController.getCurrentState();
        renderBoard(initialState);

        show(headersEl, true);
        show(moveInfoEl, true);
        show(sliderContainerEl, true);
        show(navToolbarEl, true);

        headersEl.innerHTML = `
        <div><span class="header-label">Event:</span><span class="header-value">Demo Game</span></div>
        <div><span class="header-label">Date:</span><span class="header-value">${new Date().toISOString().split("T")[0]}</span></div>
        <div><span class="header-label">Moves:</span><span class="header-value">${moveHistory.length}</span></div>
        <div><span class="header-label">RPS:</span><span class="header-value">on</span></div>
      `;

        updateMoveList();
        updateUI(initialState);
        setStatus("Demo game loaded", "success");
      }

      // ─── Flip Board ───
      function flipBoard() {
        if (!initialGame) return;
        const renderer = new BoardRenderer(boardSvg);
        renderer.setRotation(renderer.currentRotation + 180);
        // Re-render current state
        const state = replayController?.getCurrentState();
        if (state) renderBoard(state.game);
      }

      // ─── Download TSPN ───
      function downloadTSPN() {
        if (!currentTSPN) {
          setStatus("No TSPN loaded to download", "error");
          return;
        }
        const blob = new Blob([currentTSPN], { type: "application/x-tspn+json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const date = new Date().toISOString().split("T")[0];
        a.download = `trischach-replay-${date}.tspn`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setStatus("TSPN downloaded", "success");
      }

      // ─── Dark Theme Toggle ───
      function toggleDarkMode() {
        const html = document.documentElement;
        const isDark = html.getAttribute("data-theme") === "dark";
        html.setAttribute("data-theme", isDark ? "light" : "dark");
        const toggleBtn = document.getElementById("theme-toggle");
        const checkbox = document.getElementById("dark-mode-checkbox");
        if (toggleBtn) toggleBtn.classList.toggle("active", !isDark);
        if (checkbox) checkbox.checked = !isDark;
        // Save preference
        localStorage.setItem("tspn-viewer-dark-mode", !isDark);
      }

      function loadDarkModePreference() {
        const saved = localStorage.getItem("tspn-viewer-dark-mode");
        if (saved === "true") {
          document.documentElement.setAttribute("data-theme", "dark");
          const toggleBtn = document.getElementById("theme-toggle");
          const checkbox = document.getElementById("dark-mode-checkbox");
          if (toggleBtn) toggleBtn.classList.add("active");
          if (checkbox) checkbox.checked = true;
        }
      }

      // ─── Copy TSPN to Clipboard ───
      async function copyTSPN() {
        if (!currentTSPN) {
          setStatus("No TSPN loaded to copy", "error");
          return;
        }
        try {
          await navigator.clipboard.writeText(currentTSPN);
          setStatus("TSPN copied to clipboard!", "success");
          const copyBtn = document.getElementById("copy-btn");
          if (copyBtn) {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = "✅ Copied!";
            setTimeout(() => {
              copyBtn.textContent = originalText;
            }, 1500);
          }
        } catch (err) {
          setStatus(`Failed to copy: ${err.message}`, "error");
        }
      }

      // ─── Event Listeners ───
      document.getElementById("tspn-file").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => loadTSPN(ev.target.result);
          reader.readAsText(file);
        }
      });

      document.getElementById("demo-btn").addEventListener("click", loadDemo);

      document.getElementById("download-btn").addEventListener("click", downloadTSPN);
      document.getElementById("copy-btn").addEventListener("click", copyTSPN);
      document.getElementById("flip-btn").addEventListener("click", flipBoard);
      document.getElementById("theme-toggle").addEventListener("click", (e) => {
        // Prevent checkbox from toggling twice
        if (e.target.tagName !== "INPUT") {
          toggleDarkMode();
        }
      });

      document.getElementById("first-btn").addEventListener("click", firstMove);
      document.getElementById("prev-btn").addEventListener("click", prevMove);
      document.getElementById("play-btn").addEventListener("click", togglePlay);
      document.getElementById("next-btn").addEventListener("click", nextMove);
      document.getElementById("last-btn").addEventListener("click", lastMove);

      moveSlider.addEventListener("input", () => {
        const idx = parseInt(moveSlider.value);
        goToMove(idx);
      });

      document.getElementById("speed-select").addEventListener("change", () => {
        if (autoPlayTimer) {
          togglePlay(); // stop
          togglePlay(); // restart with new speed
        }
      });

      // Keyboard shortcuts
      document.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT")
          return;
        switch (e.key) {
          case "ArrowLeft":
            if (!e.shiftKey) prevMove();
            else firstMove();
            break;
          case "ArrowRight":
            if (!e.shiftKey) nextMove();
            else lastMove();
            break;
          case " ":
            e.preventDefault();
            togglePlay();
            break;
          case "Home":
            firstMove();
            break;
          case "End":
            lastMove();
            break;
          case "f":
          case "F":
            flipBoard();
            break;
          case "c":
          case "C":
            copyTSPN();
            break;
          case "d":
          case "D":
            toggleDarkMode();
            break;
        }
      });

      // ─── Init ───
      loadDarkModePreference();
      setStatus("Ready. Load a TSPN file or click Demo Game.");
      show(navToolbarEl, false);
      show(moveInfoEl, false);
      show(sliderContainerEl, false);
      show(headersEl, false);
    </script>
  </body>
</html>
