name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'

jobs:
  # ─── Phase 1: Fast checks (parallel) ──────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck

  # ─── Phase 2: Tests (parallel, after lint+typecheck) ──────────────
  test-trischach:
    name: Test Trischach
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run tests/trischach

  test-schach9x9:
    name: Test Schach9x9
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run tests/schach9x9
        continue-on-error: true  # Some tests need network access (happy-dom limitation)

  # ─── Phase 3: Build (after tests pass) ────────────────────────────
  build-schach9x9:
    name: Build Schach9x9
    runs-on: ubuntu-latest
    needs: test-schach9x9
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            engine-wasm/target
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-wasm/Cargo.lock') }}
      - run: npm run wasm:build
      - run: npm run build:schach9x9
      - uses: actions/upload-artifact@v4
        with:
          name: schach9x9-dist
          path: dist/schach9x9/
          retention-days: 7

  build-trischach:
    name: Build Trischach
    runs-on: ubuntu-latest
    needs: test-trischach
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build:trischach
      - uses: actions/upload-artifact@v4
        with:
          name: trischach-dist
          path: dist/trischach/
          retention-days: 7

  # ─── Phase 4: E2E (after builds) ──────────────────────────────────
  test-e2e-schach9x9:
    name: E2E Schach9x9
    runs-on: ubuntu-latest
    needs: build-schach9x9
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - uses: actions/download-artifact@v4
        with:
          name: schach9x9-dist
          path: dist/schach9x9
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=schach9x9-e2e
        continue-on-error: true

  test-e2e-trischach:
    name: E2E Trischach
    runs-on: ubuntu-latest
    needs: build-trischach
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - uses: actions/download-artifact@v4
        with:
          name: trischach-dist
          path: dist/trischach
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=trischach-e2e
        continue-on-error: true

  # ─── Phase 5: Release (only on main/master push) ──────────────────
  build-all:
    name: Build All (Release)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: [build-schach9x9, build-trischach]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: npm run build
      - run: |
          zip -r schach9x9.zip dist/schach9x9
          zip -r trischach.zip dist/trischach
      - uses: actions/upload-artifact@v4
        with:
          name: release-builds
          path: |
            schach9x9.zip
            trischach.zip
          retention-days: 30
