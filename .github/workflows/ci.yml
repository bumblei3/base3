name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'

jobs:
  # ─── Phase 1: Setup & Fast checks ─────────────────────────────
  setup:
    name: Setup (cache, deps, WASM)
    runs-on: ubuntu-latest
    outputs:
      node-modules-cache: ${{ steps.cache-node-modules.outputs.cache-hit }}
      cargo-cache: ${{ steps.cache-cargo.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v5
        id: cache-cargo
        name: Cache Cargo
        with:
          path: |
            engine-wasm/target
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-wasm/Cargo.lock') }}
      - name: Cache npm
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --legacy-peer-deps
      - name: Build WASM
        run: npm run wasm:build

  # ─── Phase 2: Fast checks (use setup caches) ──────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: npm run lint
      - run: npm run typecheck
      - name: Security audit
        run: npm audit --audit-level=high --omit=dev

  # ─── Phase 3: Parallel Tests (sharded) ────────────────────────
  test-trischach:
    name: Test Trischach
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore WASM
        uses: actions/cache@v5
        with:
          path: engine-wasm/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-wasm/Cargo.lock') }}
      - run: npx vitest run --config vitest.ci.config.ts tests/trischach

  test-schach9x9-shard1:
    name: Test Schach9x9 (Shard 1/4)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore WASM
        uses: actions/cache@v5
        with:
          path: engine-wasm/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-wasm/Cargo.lock') }}
      - run: npx vitest run --config vitest.ci.config.ts --reporter=verbose --shard=1/4 tests/schach9x9

  test-schach9x9-shard2:
    name: Test Schach9x9 (Shard 2/4)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore WASM
        uses: actions/cache@v5
        with:
          path: engine-wasm/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-wasm/Cargo.lock') }}
      - run: npx vitest run --config vitest.ci.config.ts --reporter=verbose --shard=2/4 tests/schach9x9

  test-schach9x9-shard3:
    name: Test Schach9x9 (Shard 3/4)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore WASM
        uses: actions/cache@v5
        with:
          path: engine-wasm/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-wasm/Cargo.lock') }}
      - run: npx vitest run --config vitest.ci.config.ts --reporter=verbose --shard=3/4 tests/schach9x9

  test-schach9x9-shard4:
    name: Test Schach9x9 (Shard 4/4)
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore WASM
        uses: actions/cache@v5
        with:
          path: engine-wasm/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-wasm/Cargo.lock') }}
      - run: npx vitest run --config vitest.ci.config.ts --reporter=verbose --shard=4/4 tests/schach9x9

  # ─── Phase 4: Build & Deploy ─────────────────────────────────
  build:
    name: Build All
    runs-on: ubuntu-latest
    needs: [quality, test-trischach, test-schach9x9-shard1, test-schach9x9-shard2, test-schach9x9-shard3, test-schach9x9-shard4]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Restore node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Restore WASM
        uses: actions/cache@v5
        with:
          path: engine-wasm/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-wasm/Cargo.lock') }}
      - run: npm run build
      - name: Generate API Docs (TypeDoc)
        run: npm run docs:api
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: _pages

      - name: Move landing page to root
        run: |
          cp -r _pages/landing/* _pages/
          rm -rf _pages/landing

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4