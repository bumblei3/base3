name: GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build for GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache WASM build
        uses: actions/cache@v4
        with:
          path: |
            engine-wasm/target
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine-wasm/Cargo.lock') }}

      - name: Build WASM
        run: npm run wasm:build

      - name: Build All (landing + schach9x9 + trischach)
        run: npm run build

      - name: Prepare Pages directory
        run: |
          mkdir -p _pages
          # Landing page (built to dist/)
          cp -r dist/*.html dist/*.css _pages/ 2>/dev/null || true
          cp -r dist/assets _pages/assets 2>/dev/null || true
          # Schach9x9
          cp -r dist/schach9x9 _pages/schach9x9
          # Trischach
          cp -r dist/trischach _pages/trischach
          # Create .nojekyll
          touch _pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
