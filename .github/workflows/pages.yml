name: GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build for GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Schach9x9
        run: npm run build:schach9x9

      - name: Build Trischach
        run: npm run build:trischach

      - name: Prepare Pages directory
        run: |
          mkdir -p _pages
          # Landing page
          cp index.html _pages/
          # Schach9x9
          cp -r dist/schach9x9 _pages/schach9x9
          # Trischach
          cp -r dist/trischach _pages/trischach
          # CSS
          cp -r css _pages/css
          # JS (for landing page imports)
          cp -r js _pages/js
          # Public assets
          cp -r public _pages/public 2>/dev/null || true
          # Create .nojekyll to prevent GitHub Pages from ignoring files starting with _
          touch _pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
