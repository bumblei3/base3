name: Release

on:
  push:
    branches: [main, master]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build All
        run: npm run build

      - name: Run Tests
        run: npm test --if-present
        continue-on-error: true

      - name: Upload Release Assets
        uses: actions/upload-artifact@v4
        with:
          name: release-builds
          path: |
            dist/schach9x9/
            dist/trischach/
          retention-days: 30
