version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-plugin-*"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
          - "ts-*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "rollup"
      playwright:
        patterns:
          - "@playwright/*"
          - "playwright"
